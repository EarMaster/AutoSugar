name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to upload to
        required: false
        default: beta
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

jobs:
  release:
    name: Tag, publish & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.tag_check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' | awk 'NR==1{p=1} p')
          # Preserve multiline output
          {
            echo "body<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.notes.outputs.body }}"

      - uses: actions/setup-java@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3
        if: steps.tag_check.outputs.exists == 'false'

      - name: Decode keystore
        if: steps.tag_check.outputs.exists == 'false'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build signed APK and AAB
        if: steps.tag_check.outputs.exists == 'false'
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload APK to GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            app/build/outputs/apk/release/app-release.apk \
            --clobber

      - name: Prepare what's new for Google Play
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          mkdir -p whatsnew
          echo "${{ steps.notes.outputs.body }}" > whatsnew/whatsnew-en-US

      - name: Upload to Google Play
        if: steps.tag_check.outputs.exists == 'false'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: de.autosugar
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track || 'beta' }}
          whatsNewDirectory: whatsnew/
